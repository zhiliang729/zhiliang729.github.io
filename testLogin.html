<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
        <script src="//code.jquery.com/jquery-2.1.1.min.js"></script>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>Hello</title>
        
        <style>
            * {
                margin: 0;
                padding: 0;
            }
        
        body {
            width: 95%;
            margin: 50px auto;
            font-family: "Helvetica Neue", Helvetica, sans-serif;
        }
        
        p {
            margin-top: 2em;
        }
        </style>
    </head>
    <body>
        <button onclick="login()">登录注册</button>
        <button onclick="share()">分享</button>
        <button onclick="doLinkOnClick()">链接</button>
        <button onclick="androidOrIos()">系统判断</button>
        <button onclick="alertShow()">alert</button>
        <button onclick="confirmShow()">confirm</button>
        <button onclick="promptShow()">prompt</button>
        <a href="http://www.baidu.com/">百度</a>
        
        <script type="text/javascript">
        function openCamera() {
            window.location.href="rhcturl://localcmd/openCamera";
        }
        
        function login() {
            try {
<!--                postMessage参数不可谓空-->
                window.webkit.messageHandlers.WebCallUserLogin.postMessage("");
            } catch(err) {
                window.location.href="rhcturl://localcmd/WebCallUserLogin";
            }
        }
        function share() {
            try {
<!--                postMessage参数不可谓空-->
                window.webkit.messageHandlers.ShareActivity.postMessage("");
            } catch(err) {
                window.location.href="rhcturl://localcmd/ShareActivity";
            }
        }
        function androidOrIos() {
            var u = navigator.userAgent;
            var isIOS = u.indexOf('iOS') > -1;
            if (isIOS == true) {
                alert("是ios");
            } else {
                alert(u);
            }
        }
        
        function doLinkOnClick() {
            try {
<!--                postMessage参数不可谓空-->
                var message = 'type=1&link=2976065062';
                window.webkit.messageHandlers.doLinkOnClick.postMessage(message);
            } catch(err) {
                window.location.href="rhcturl://localcmd/doLinkOnClick?type=1&link=2976065062";
            }
        }
        
        function alertShow() {
            alert('显示alert');
        }
        
        function confirmShow() {
            var confirmed = confirm('OK?');
        }
        
        function promptShow() {
            var person = prompt('请输入姓名', '你的名字');
        }
        </script>
    </body>
</html>
